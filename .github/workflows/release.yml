name: Release to PyPI

# Triggers when you push a tag matching v*.*.* (e.g. v0.4.0).
#
# Setup (one-time):
#   1. Create a "Trusted Publisher" on PyPI:
#        https://pypi.org/manage/account/publishing/
#      Project name:    mneme-cli
#      Owner:           tolism
#      Repository:      mneme           (the GitHub repo, not the PyPI dist name)
#      Workflow name:   release.yml
#      Environment:     pypi
#   2. Repeat for TestPyPI if you want test releases:
#        https://test.pypi.org/manage/account/publishing/
#      Use the same details, environment: testpypi
#   3. In this repo, create environments named "pypi" and "testpypi"
#      under Settings -> Environments (no secrets required, OIDC handles it).
#
# Cutting a release:
#   # Bump version in mneme/__init__.py first, commit, then:
#   git tag v0.4.0
#   git push origin v0.4.0
#
# To run a TestPyPI release instead, push a tag like `v0.4.0-rc1`.

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'         # production release
      - 'v[0-9]+.[0-9]+.[0-9]+-*'       # pre-release -> TestPyPI

jobs:
  build:
    name: Build sdist + wheel
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install build tooling
        run: |
          python -m pip install --upgrade pip
          python -m pip install build twine

      - name: Build distributions
        run: python -m build

      - name: Check distributions
        run: twine check dist/*

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  publish-testpypi:
    name: Publish to TestPyPI (pre-release tags)
    needs: build
    if: contains(github.ref, '-')
    runs-on: ubuntu-latest
    environment:
      name: testpypi
      url: https://test.pypi.org/project/mneme-cli/
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Publish to TestPyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/

  publish-pypi:
    name: Publish to PyPI (release tags)
    needs: build
    if: ${{ !contains(github.ref, '-') }}
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/project/mneme-cli/
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1

  github-release:
    name: Create GitHub release
    needs: publish-pypi
    if: ${{ !contains(github.ref, '-') }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true
          body_path: CHANGELOG.md
